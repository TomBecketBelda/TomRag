  <text x="980" y="320" font-family="Helvetica, Arial, sans-serif" font-size="17" font-weight="700" fill="#4b0f14">Timi: quien es Tomas Belda?</text>

  <rect x="454" y="360" width="780" height="92" rx="16" fill="#fff6f5" stroke="#e7c3c7"/>
  <text x="474" y="392" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#4e1a1f">LLM: Tomas Belda es una persona mencionada en tus documentos indexados.</text>
  <text x="474" y="416" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#4e1a1f">Puedo darte un resumen profesional mas detallado si quieres.</text>
  <text x="474" y="440" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#6b2830">Fuentes: Tomas Belda_Zwischenzeugnis_signed.pdf</text>

  <rect x="1020" y="470" width="320" height="54" rx="16" fill="#ffd9d4" stroke="#e8a8b0"/>
  <text x="1040" y="504" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="700" fill="#4b0f14">Timi: dame un resumen breve</text>

  <rect x="454" y="544" width="830" height="108" rx="16" fill="#fff6f5" stroke="#e7c3c7"/>
  <text x="474" y="576" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#4e1a1f">LLM: Resumen breve: perfil tecnico y experiencia documentada en el archivo.</text>
  <text x="474" y="600" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#4e1a1f">Si quieres, lo convierto en puntos clave para entrevista.</text>
  <text x="474" y="624" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#6b2830">Fuentes: Tomas Belda_Zwischenzeugnis_signed.pdf</text>

