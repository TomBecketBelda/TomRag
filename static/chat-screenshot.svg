  <text x="1033" y="366" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="700" fill="#4b0f14">You: Create a summary</text>

  <rect x="464" y="406" width="824" height="96" rx="16" fill="#fff6f5" stroke="#e7c3c7"/>
  <text x="484" y="439" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#4e1a1f">Assistant: Here is a one-line summary based on the document context. If needed,</text>
  <text x="484" y="463" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#4e1a1f">I can also provide a bullet list with key points and action items.</text>
  <text x="484" y="487" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#6b2830">Sources: Tomas_Belda_Zwischenzeugnis.pdf</text>

  <rect x="438" y="742" width="620" height="54" rx="27" fill="#fffdfd" stroke="#d8a8ad"/>
