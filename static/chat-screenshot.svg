  <text x="456" y="840" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#391014">Escribe tu pregunta...</text>

  <rect x="1068" y="804" width="120" height="56" rx="28" fill="url(#btn)"/>
  <text x="1108" y="840" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="700" fill="#fff">Enviar</text>

  <rect x="1200" y="804" width="160" height="56" rx="28" fill="#8f1e2d"/>
  <text x="1234" y="840" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="700" fill="#fff">Limpiar chat</text>
