<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="860" viewBox="0 0 1400 860" role="img" aria-label="Chat TOM interface screenshot">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f7e7e6"/>
      <stop offset="100%" stop-color="#f1d3d1"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#fff7f6"/>
      <stop offset="100%" stop-color="#ffe9e7"/>
    </linearGradient>
    <linearGradient id="btn" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#96171f"/>
      <stop offset="100%" stop-color="#5e0c12"/>
    </linearGradient>
  </defs>

  <rect width="1400" height="860" fill="url(#bg)"/>
  <rect x="26" y="22" width="370" height="816" rx="24" fill="url(#panel)" stroke="#d9a8ae"/>
  <rect x="414" y="22" width="960" height="816" rx="24" fill="#fff7f6" stroke="#d9a8ae"/>

  <text x="52" y="72" font-family="Helvetica, Arial, sans-serif" font-size="34" font-weight="700" fill="#5e0c12">Chats</text>
  <rect x="265" y="40" width="108" height="36" rx="18" fill="url(#btn)"/>
  <text x="282" y="63" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="700" fill="#fff">New chat</text>

  <rect x="48" y="98" width="326" height="92" rx="16" fill="#ffdcd8" stroke="#96171f"/>
  <text x="62" y="126" font-family="Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#7f2d35">Project chat - 12 msg - 2/28/2026</text>
  <text x="62" y="151" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#5f2228">Can you summarize my contract in one line...</text>
  <rect x="297" y="110" width="66" height="24" rx="12" fill="#b72a3a"/>
  <text x="311" y="126" font-family="Helvetica, Arial, sans-serif" font-size="11" font-weight="700" fill="#fff">Delete</text>

  <rect x="48" y="202" width="326" height="92" rx="16" fill="#fff9f8" stroke="#e8b3b8"/>
  <text x="62" y="230" font-family="Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#7f2d35">Ideas - 4 msg - 2/27/2026</text>
  <text x="62" y="255" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#5f2228">Draft a product positioning statement...</text>
  <rect x="297" y="214" width="66" height="24" rx="12" fill="#b72a3a"/>
  <text x="311" y="230" font-family="Helvetica, Arial, sans-serif" font-size="11" font-weight="700" fill="#fff">Delete</text>

  <circle cx="470" cy="76" r="30" fill="#ffe0dc" stroke="#de9ca4"/>
  <path d="M470 52c-9 0-16 7-16 16v8c0 9 7 16 16 16s16-7 16-16v-8c0-9-7-16-16-16z" fill="#7a0f16"/>
  <path d="M468 60h4v16h-4zM460 66h20v4h-20z" fill="#fff5f4"/>
  <text x="515" y="72" font-family="Helvetica, Arial, sans-serif" font-size="40" font-weight="700" fill="#5e0c12">Chat TOM</text>
  <text x="516" y="98" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#743036">Document assistant with RAG memory</text>

  <rect x="438" y="124" width="912" height="600" rx="20" fill="#fffefe" stroke="#e3b8bc"/>
  <rect x="1124" y="164" width="204" height="52" rx="16" fill="#ffd9d4" stroke="#e8a8b0"/>
  <text x="1142" y="196" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="700" fill="#4b0f14">You: Hello Tom</text>

  <rect x="464" y="234" width="760" height="78" rx="16" fill="#fff6f5" stroke="#e7c3c7"/>
  <text x="484" y="267" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#4e1a1f">Assistant: I found relevant context in your indexed files and prepared a concise answer.</text>
  <text x="484" y="291" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#6b2830">Sources: intelligence_artificial.txt, Tomas_Belda_Zwischenzeugnis.pdf</text>

