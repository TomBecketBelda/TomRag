<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-label="Captura actualizada de Chat TOM con medidor emocional">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f7e7e6"/>
      <stop offset="100%" stop-color="#f1d3d1"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#fff7f6"/>
      <stop offset="100%" stop-color="#ffe9e7"/>
    </linearGradient>
    <linearGradient id="main" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#fffdfc"/>
      <stop offset="100%" stop-color="#fff3f2"/>
    </linearGradient>
    <linearGradient id="btn" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#96171f"/>
      <stop offset="100%" stop-color="#5e0c12"/>
    </linearGradient>
    <linearGradient id="meter" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#8f1e2d"/>
      <stop offset="60%" stop-color="#d44c5c"/>
      <stop offset="100%" stop-color="#f2b168"/>
    </linearGradient>
  </defs>

  <rect width="1400" height="900" fill="url(#bg)"/>

  <rect x="20" y="20" width="360" height="860" rx="24" fill="url(#panel)" stroke="#d9a8ae"/>
  <rect x="400" y="20" width="980" height="860" rx="24" fill="url(#main)" stroke="#d9a8ae"/>

  <text x="46" y="68" font-family="Helvetica, Arial, sans-serif" font-size="34" font-weight="700" fill="#5e0c12">Chats</text>
  <rect x="262" y="34" width="98" height="36" rx="18" fill="url(#btn)"/>
  <text x="279" y="57" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="700" fill="#fff">Nuevo</text>

  <rect x="42" y="94" width="316" height="98" rx="16" fill="#ffe3e0" stroke="#96171f"/>
  <text x="56" y="121" font-family="Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#7f2d35">Chat 1 - 14 msg - LLM ON</text>
  <text x="56" y="147" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#5f2228">quien es Tomas Belda?</text>
  <rect x="282" y="106" width="68" height="24" rx="12" fill="#b72a3a"/>
  <text x="298" y="122" font-family="Helvetica, Arial, sans-serif" font-size="11" font-weight="700" fill="#fff">Eliminar</text>

  <rect x="42" y="206" width="316" height="98" rx="16" fill="#fff9f8" stroke="#e8b3b8"/>
  <text x="56" y="233" font-family="Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#7f2d35">Ideas - 4 msg - LLM OFF</text>
  <text x="56" y="259" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#5f2228">resumen de proyecto para cliente...</text>
  <rect x="282" y="218" width="68" height="24" rx="12" fill="#b72a3a"/>
  <text x="298" y="234" font-family="Helvetica, Arial, sans-serif" font-size="11" font-weight="700" fill="#fff">Eliminar</text>

  <circle cx="460" cy="72" r="28" fill="#ffe6e4" stroke="#de9ca4"/>
  <path d="M460 50c-8 0-14 6-14 14v7c0 8 6 14 14 14s14-6 14-14v-7c0-8-6-14-14-14z" fill="#7a0f16"/>
  <path d="M458 58h4v14h-4zM451 63h18v4h-18z" fill="#fff5f4"/>
  <text x="502" y="66" font-family="Helvetica, Arial, sans-serif" font-size="40" font-weight="700" fill="#5e0c12">Chat TOM</text>
  <text x="503" y="92" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#743036">Asistente documental con memoria por conversaciones.</text>

  <text x="430" y="132" font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="700" fill="#5e0c12">Usuario:</text>
