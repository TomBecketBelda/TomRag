  <rect x="1073" y="742" width="116" height="54" rx="27" fill="url(#btn)"/>
  <text x="1112" y="776" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="700" fill="#fff">Send</text>

  <rect x="1200" y="742" width="150" height="54" rx="27" fill="#8f1e2d"/>
  <text x="1232" y="776" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="700" fill="#fff">Clear chat</text>
