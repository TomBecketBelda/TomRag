  <rect x="942" y="106" width="170" height="34" rx="17" fill="#364047"/>
  <text x="972" y="128" font-family="Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#fff">Activar LLM</text>

  <rect x="430" y="154" width="930" height="86" rx="16" fill="#fff8f7" stroke="#e3b8bc"/>
  <text x="448" y="179" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="700" fill="#5e0c12">Medidor emocional (ultimo mensaje real)</text>
  <text x="1180" y="179" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#5e0c12">miedo - 44% (bajo)</text>
  <rect x="448" y="190" width="894" height="12" rx="6" fill="#f1cacf"/>
  <rect x="448" y="190" width="394" height="12" rx="6" fill="url(#meter)"/>
  <text x="448" y="225" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#743036">Ultimo mensaje de Timi - confianza: 52%</text>

  <rect x="430" y="256" width="930" height="530" rx="20" fill="#fffefe" stroke="#e3b8bc"/>

